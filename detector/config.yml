log:
  path: /var/log/nginx/hng-access.log

window:
  seconds: 60

baseline:
  window_minutes: 30
  recalc_interval_secs: 60

detector:
  z_threshold: 3.0
  rate_multiplier: 5.0
  error_multiplier: 3.0

  # IPs that are NEVER banned regardless of traffic.
  # Add your GCP internal IP, health-check sources, monitoring probes, etc.
  # You can also set the ALLOWLIST env var (comma-separated) in docker-compose.
  allowlist:
    # - "10.128.0.2"   # example: GCP internal VM IP
    # - "127.0.0.1"    # loopback

blocker:
  ipset_name: ddos_blocklist
  duration_minutes: [10, 30, 120] # permanent appended automatically
  # How long an IP's offense history is remembered.
  # Must be longer than the highest duration_minutes value so the ladder
  # can actually be climbed across multiple ban/release cycles.
  # Default: 24h — an IP that causes trouble today is remembered all day.
  offense_memory_hours: 24
  db_path: /var/log/ddos-daemon/offenses.db

unbanner:
  check_interval_secs: 30

notifier:
  webhook_url: "" # leave empty to disable Slack; override with SLACK_WEBHOOK_URL env var
  audit_log_path: /var/log/ddos-daemon/audit.log

dashboard:
  port: 8080
