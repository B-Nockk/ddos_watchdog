# =============================================================================
# nginx.conf — DDoS Detection Daemon
# CLOUD config for ddos-watchdog.duckdns.org
# =============================================================================

worker_processes auto;

events {
    worker_connections 1024;
}

http {
    set_real_ip_from  10.0.0.0/8;
    set_real_ip_from  172.16.0.0/12;
    set_real_ip_from  192.168.0.0/16;
    real_ip_header    X-Forwarded-For;
    real_ip_recursive on;

    log_format json_combined escape=json
        '{'
            '"source_ip":"$remote_addr",'
            '"timestamp":"$time_iso8601",'
            '"method":"$request_method",'
            '"path":"$request_uri",'
            '"status":$status,'
            '"response_size":$body_bytes_sent,'
            '"http_host":"$host",'
            '"user_agent":"$http_user_agent",'
            '"request_time":$request_time,'
            '"upstream_response_time":"$upstream_response_time"'
        '}';

    access_log /var/log/nginx/hng-access.log json_combined;
    error_log  /var/log/nginx/error.log warn;

    upstream nextcloud {
        server nextcloud:80;
        keepalive 32;
    }

    upstream daemon {
        server daemon:8080;
    }

    # -------------------------------------------------------------------------
    # HTTP — ACME challenge + healthcheck only, everything else → HTTPS
    # -------------------------------------------------------------------------
    server {
        listen 80;
        server_name ddos-watchdog.duckdns.org;

        location /.well-known/acme-challenge/ {
            root /var/www/certbot;
        }

        # healthcheck must be reachable without SSL
        location /nginx-health {
            access_log off;
            return 200 "ok\n";
            add_header Content-Type text/plain;
        }

        location / {
            return 301 https://$host$request_uri;
        }
    }

    # -------------------------------------------------------------------------
    # HTTPS
    # -------------------------------------------------------------------------
    server {
        listen 443 ssl;
        server_name ddos-watchdog.duckdns.org;

        ssl_certificate     /etc/letsencrypt/live/ddos-watchdog.duckdns.org/fullchain.pem;
        ssl_certificate_key /etc/letsencrypt/live/ddos-watchdog.duckdns.org/privkey.pem;

        ssl_protocols             TLSv1.2 TLSv1.3;
        ssl_ciphers               HIGH:!aNULL:!MD5;
        ssl_prefer_server_ciphers on;
        ssl_session_cache         shared:SSL:10m;
        ssl_session_timeout       10m;

        proxy_set_header Host              $host;
        proxy_set_header X-Real-IP         $remote_addr;
        proxy_set_header X-Forwarded-For   $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto https;

        client_max_body_size 10G;
        proxy_connect_timeout 60s;
        proxy_send_timeout    300s;
        proxy_read_timeout    300s;

        # ── Daemon dashboard ──────────────────────────────────────────────────
        location = /ddos-dashboard {
            return 301 /ddos-dashboard/;
        }

        location /ddos-dashboard/ {
            proxy_pass http://daemon/;
        }

        location /metrics {
            proxy_pass http://daemon/metrics;
        }

        # ── Nextcloud ─────────────────────────────────────────────────────────
        location / {
            proxy_pass http://nextcloud;
        }

        location /nginx-health {
            access_log off;
            return 200 "ok\n";
            add_header Content-Type text/plain;
        }
    }
}
