volumes:
    HNG-nginx-logs:
    audit_volume:

networks:
    ddos_net:
        driver: bridge

services:
    nextcloud:
        image: kefaslungu/hng-nextcloud
        container_name: ddos_nextcloud
        hostname: nextcloud
        volumes:
            - HNG-nginx-logs:/var/log/nginx:ro
        networks:
            - ddos_net
        restart: unless-stopped
        deploy:
            resources:
                limits:
                    memory: ${NEXTCLOUD_MEMORY_LIMIT:-768M}

    daemon:
        image: ghcr.io/b-nockk/ddos-watchdog:latest
        build:
            context: ./detector
            dockerfile: Dockerfile
        container_name: ddos_daemon
        hostname: daemon
        volumes:
            - HNG-nginx-logs:/var/log/nginx:ro
            - audit_volume:/var/log/ddos-daemon
            - ./detector/config.yml:/app/config.yml:ro
        ports:
            - "${DAEMON_PORT:-8080}:8080"
        environment:
            - SLACK_WEBHOOK_URL=${SLACK_WEBHOOK_URL}
            - LOG_PATH=${LOG_PATH:-/var/log/nginx/hng-access.log}
            - AUDIT_LOG_PATH=${AUDIT_LOG_PATH:-/var/log/ddos-daemon/audit.log}
            - DAEMON_PORT=${DAEMON_PORT:-8080}
            - DOMAIN=${DOMAIN:-localhost}
        cap_add:
            - NET_ADMIN
            - NET_RAW
        privileged: true
        networks:
            - ddos_net
        restart: unless-stopped
        logging:
            driver: json-file
            options:
                max-size: "10m"
                max-file: "3"

    nginx:
        image: nginx:1.25-alpine
        container_name: ddos_nginx
        hostname: nginx
        ports:
            - "80:80"
            - "443:443"
        volumes:
            - ./nginx/nginx.conf:/etc/nginx/nginx.conf:ro
            - HNG-nginx-logs:/var/log/nginx
            - /etc/letsencrypt:/etc/letsencrypt:ro
            - /var/www/certbot:/var/www/certbot:ro
        depends_on:
            - nextcloud
            - daemon # nginx waits for daemon to exist
        healthcheck:
            test:
                [
                    "CMD",
                    "sh",
                    "-c",
                    "wget -qO /dev/null http://127.0.0.1/nginx-health || exit 1",
                ]
            interval: 5s
            timeout: 3s
            retries: 10
        networks:
            - ddos_net
        restart: unless-stopped
